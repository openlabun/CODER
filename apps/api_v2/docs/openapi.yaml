openapi: 3.0.3
info:
  title: CODER API v2
  version: 2.0.0
  description: |
    OpenAPI documentation aligned with the new endpoint structure.
    Mockup contracts are documented per operation in:
    apps/api_v2/internal/interfaces/http/(module)/(endpoint)/mockup/{input.json,output.json}
servers:
  - url: http://localhost:4000
tags:
  - name: auth
  - name: ai
  - name: challenges
  - name: test-cases
  - name: courses
  - name: exams
  - name: submissions
  - name: leaderboard
  - name: metrics
  - name: health
paths:
  /submissions/challenge/{challengeId}:
      get:
        tags:
          - submissions
        summary: List submissions by challenge
        description: |
          Devuelve todas las submissions asociadas a un challenge. Permite filtrar por status y testId.
          Requiere autenticación y permisos adecuados (ver lógica de roles en backend).
        x-implementation: usecase
        x-mockup:
          input: apps/api_v2/internal/interfaces/http/submissions/get-by-challenge-id/mockup/input.json
          output: apps/api_v2/internal/interfaces/http/submissions/get-by-challenge-id/mockup/output.json
        parameters:
          - in: path
            name: challengeId
            required: true
            schema:
              type: string
          - in: query
            name: status
            required: false
            schema:
              type: string
          - in: query
            name: testId
            required: false
            schema:
              type: string
        responses:
          "200":
            description: Lista de submissions para el challenge.
            content:
              application/json:
                schema:
                  type: array
                  items:
                    $ref: "#/components/schemas/SubmissionOutputDTO"
                example:
                  - submission:
                      id: sub-1
                      userID: usr-1
                      challengeID: chal-1
                      sessionID: sess-1
                      code: print(1)
                      language: python
                    results:
                      - id: res-1
                        status: passed

  /submissions/session/{sessionId}:
      get:
        tags:
          - submissions
        summary: List submissions by session
        description: |
          Devuelve todas las submissions asociadas a una sesión. Permite filtrar por status, testId y challengeId.
          Requiere autenticación y permisos adecuados (ver lógica de roles en backend).
        x-implementation: usecase
        x-mockup:
          input: apps/api_v2/internal/interfaces/http/submissions/get-by-session-id/mockup/input.json
          output: apps/api_v2/internal/interfaces/http/submissions/get-by-session-id/mockup/output.json
        parameters:
          - in: path
            name: sessionId
            required: true
            schema:
              type: string
          - in: query
            name: status
            required: false
            schema:
              type: string
          - in: query
            name: testId
            required: false
            schema:
              type: string
          - in: query
            name: challengeId
            required: false
            schema:
              type: string
        responses:
          "200":
            description: Lista de submissions para la sesión.
            content:
              application/json:
                schema:
                  type: array
                  items:
                    $ref: "#/components/schemas/SubmissionOutputDTO"
                example:
                  - submission:
                      id: sub-1
                      userID: usr-1
                      challengeID: chal-1
                      sessionID: sess-1
                      code: print(1)
                      language: python
                    results:
                      - id: res-1
                        status: passed
  /auth/register:
    post:
      tags:
        - auth
      summary: Register user
      x-implementation: usecase
      x-mockup:
        input: apps/api_v2/internal/interfaces/http/auth/post-register/mockup/input.json
        output: apps/api_v2/internal/interfaces/http/auth/post-register/mockup/output.json
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthPostRegisterInput"
            example: &a1
              method: POST
              path: /auth/register
              pathParams: {}
              query: {}
              body:
                email: student@example.com
                name: Student Test
                password: Testing123!
      responses:
        "201":
          description: Register response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthPostRegisterOutput201"
              example: &a2
                statusCode: 201
                body:
                  token:
                    access_token: jwt-access-token
                    refresh_token: jwt-refresh-token
                  user_data:
                    id: usr-123
                    username: Student Test
                    email: student@example.com
                    role: student
  /auth/login:
    post:
      tags:
        - auth
      summary: Login user
      x-implementation: usecase
      x-mockup:
        input: apps/api_v2/internal/interfaces/http/auth/post-login/mockup/input.json
        output: apps/api_v2/internal/interfaces/http/auth/post-login/mockup/output.json
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthPostLoginInput"
            example: &a3
              method: POST
              path: /auth/login
              pathParams: {}
              query: {}
              body:
                email: student@example.com
                password: Testing123!
      responses:
        "200":
          description: Login response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthPostLoginOutput200"
              example: &a4
                statusCode: 200
                body:
                  token:
                    access_token: jwt-access-token
                    refresh_token: jwt-refresh-token
                  user_data:
                    id: usr-123
                    username: Student Test
                    email: student@example.com
                    role: student
  /auth/me:
    get:
      tags:
        - auth
      summary: Current user
      x-implementation: usecase
      x-mockup:
        input: apps/api_v2/internal/interfaces/http/auth/get-me/mockup/input.json
        output: apps/api_v2/internal/interfaces/http/auth/get-me/mockup/output.json
      responses:
        "200":
          description: Current user response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthGetMeOutput200"
              example: &a5
                statusCode: 200
                body:
                  id: usr-123
                  username: Student Test
                  email: student@example.com
                  role: student
  /auth/refresh-token:
    post:
      tags:
        - auth
      summary: Refresh auth token
      x-implementation: usecase
      x-mockup:
        input: apps/api_v2/internal/interfaces/http/auth/post-refresh-token/mockup/input.json
        output: apps/api_v2/internal/interfaces/http/auth/post-refresh-token/mockup/output.json
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthPostRefreshTokenInput"
      responses:
        "200":
          description: Refreshed token response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthPostRefreshTokenOutput200"
  /ai/generate-challenge-ideas:
    post:
      tags:
        - ai
      summary: Generate challenge ideas
      x-implementation: mock
      x-mockup:
        input: apps/api_v2/internal/interfaces/http/ai/post-generate-challenge-ideas/mockup/input.json
        output: apps/api_v2/internal/interfaces/http/ai/post-generate-challenge-ideas/mockup/output.json
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiPostGenerateChallengeIdeasInput"
            example: &a6
              method: POST
              path: /ai/generate-challenge-ideas
              pathParams: {}
              query: {}
              body:
                topic: sorting
                difficulty: easy
                count: 3
      responses:
        "200":
          description: Mock AI challenge ideas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiPostGenerateChallengeIdeasOutput200"
              example: &a7
                statusCode: 501
                body:
                  message: AI challenge idea generation not implemented in application usecases
  /ai/generate-test-cases:
    post:
      tags:
        - ai
      summary: Generate test cases
      x-implementation: mock
      x-mockup:
        input: apps/api_v2/internal/interfaces/http/ai/post-generate-test-cases/mockup/input.json
        output: apps/api_v2/internal/interfaces/http/ai/post-generate-test-cases/mockup/output.json
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiPostGenerateTestCasesInput"
            example: &a8
              method: POST
              path: /ai/generate-test-cases
              pathParams: {}
              query: {}
              body:
                challengeDescription: Sum two integers
                inputFormat: a b
                outputFormat: a+b
                publicCount: 2
                hiddenCount: 3
      responses:
        "200":
          description: Mock AI test cases
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiPostGenerateTestCasesOutput200"
              example: &a9
                statusCode: 501
                body:
                  message: AI test case generation not implemented in application usecases
  /challenges:
    post:
      tags:
        - challenges
      summary: Create challenge
      x-implementation: usecase
      x-mockup:
        input: apps/api_v2/internal/interfaces/http/challenges/post-create/mockup/input.json
        output: apps/api_v2/internal/interfaces/http/challenges/post-create/mockup/output.json
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChallengesPostCreateInput"
            example: &a10
              method: POST
              path: /challenges
              pathParams: {}
              query: {}
              body:
                title: Two Sum
                description: Return indexes of two numbers that add up to target
                tags:
                  - arrays
                  - hashmap
                status: draft
                difficulty: easy
                workerTimeLimit: 1500
                workerMemoryLimit: 256
                inputVariables:
                  - name: nums
                    type: string
                    value: 2,7,11,15
                  - name: target
                    type: int
                    value: "9"
                outputVariable:
                  name: indexes
                  type: string
                  value: 0,1
                constraints: 2 <= n <= 10000
                examID: exam-123
      responses:
        "201":
          description: Challenge created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChallengesPostCreateOutput201"
              example: &a11
                statusCode: 201
                body:
                  id: challenge-123
                  title: Two Sum
                  status: draft
                  difficulty: easy
                  examID: exam-123
    get:
      tags:
        - challenges
      summary: List challenges
      x-implementation: usecase
      x-mockup:
        input: apps/api_v2/internal/interfaces/http/challenges/get-list/mockup/input.json
        output: apps/api_v2/internal/interfaces/http/challenges/get-list/mockup/output.json
      parameters:
        - in: query
          name: examId
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Challenge list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChallengesGetListOutput200"
              example: &a12
                statusCode: 200
                body:
                  - id: challenge-123
                    title: Two Sum
                    status: published
                    difficulty: easy
                    examID: exam-123
  /challenges/{id}:
    get:
      tags:
        - challenges
      summary: Get challenge by ID
      x-implementation: usecase
      x-mockup:
        input: apps/api_v2/internal/interfaces/http/challenges/get-by-id/mockup/input.json
        output: apps/api_v2/internal/interfaces/http/challenges/get-by-id/mockup/output.json
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Challenge details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChallengesGetByIdOutput200"
              example: &a13
                statusCode: 200
                body:
                  id: challenge-123
                  title: Two Sum
                  description: Return indexes of two numbers that add up to target
                  status: published
                  difficulty: easy
                  examID: exam-123
    patch:
      tags:
        - challenges
      summary: Update challenge
      x-implementation: usecase
      x-mockup:
        input: apps/api_v2/internal/interfaces/http/challenges/patch-update/mockup/input.json
        output: apps/api_v2/internal/interfaces/http/challenges/patch-update/mockup/output.json
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChallengesPatchUpdateInput"
            example: &a14
              method: PATCH
              path: /challenges/{id}
              pathParams:
                id: challenge-123
              query: {}
              body:
                title: Two Sum Updated
                difficulty: medium
                workerTimeLimit: 2000
      responses:
        "200":
          description: Challenge update
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChallengesPatchUpdateOutput200"
              example: &a15
                statusCode: 200
                body:
                  id: challenge-123
                  title: Two Sum Updated
    delete:
      tags:
        - challenges
      summary: Delete challenge
      x-implementation: usecase
      x-mockup:
        input: apps/api_v2/internal/interfaces/http/challenges/delete-by-id/mockup/input.json
        output: apps/api_v2/internal/interfaces/http/challenges/delete-by-id/mockup/output.json
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Challenge deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChallengesDeleteByIdOutput200"
  /challenges/{id}/publish:
    post:
      tags:
        - challenges
      summary: Publish challenge
      x-implementation: usecase
      x-mockup:
        input: apps/api_v2/internal/interfaces/http/challenges/post-publish/mockup/input.json
        output: apps/api_v2/internal/interfaces/http/challenges/post-publish/mockup/output.json
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Publish response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChallengesPostPublishOutput200"
              example: &a16
                statusCode: 200
                body:
                  id: challenge-123
                  status: published
  /challenges/{id}/archive:
    post:
      tags:
        - challenges
      summary: Archive challenge
      x-implementation: usecase
      x-mockup:
        input: apps/api_v2/internal/interfaces/http/challenges/post-archive/mockup/input.json
        output: apps/api_v2/internal/interfaces/http/challenges/post-archive/mockup/output.json
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Archive response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChallengesPostArchiveOutput200"
              example: &a17
                statusCode: 200
                body:
                  id: challenge-123
                  status: archived
  /test-cases:
    post:
      tags:
        - test-cases
      summary: Create test case
      x-implementation: usecase
      x-mockup:
        input: apps/api_v2/internal/interfaces/http/test-cases/post-create/mockup/input.json
        output: apps/api_v2/internal/interfaces/http/test-cases/post-create/mockup/output.json
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestCasesPostCreateInput"
            example: &a18
              method: POST
              path: /test-cases
              pathParams: {}
              query: {}
              body:
                name: tc_add_1
                input:
                  - name: a
                    type: int
                    value: "2"
                  - name: b
                    type: int
                    value: "3"
                expectedOutput:
                  name: sum
                  type: int
                  value: "5"
                isSample: true
                points: 10
                challengeID: challenge-123
      responses:
        "201":
          description: Test case created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestCasesPostCreateOutput201"
              example: &a19
                statusCode: 201
                body:
                  id: test-case-123
                  challengeID: challenge-123
                  isSample: true
                  points: 10
  /test-cases/challenge/{challengeId}:
    get:
      tags:
        - test-cases
      summary: List test cases by challenge
      x-implementation: usecase
      x-mockup:
        input: apps/api_v2/internal/interfaces/http/test-cases/get-by-challenge-id/mockup/input.json
        output: apps/api_v2/internal/interfaces/http/test-cases/get-by-challenge-id/mockup/output.json
      parameters:
        - in: path
          name: challengeId
          required: true
          schema:
            type: string
        - in: query
          name: samplesOnly
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Test cases list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestCasesGetByChallengeIdOutput200"
              example: &a20
                statusCode: 200
                body:
                  - id: test-case-123
                    name: tc_add_1
                    isSample: true
                    points: 10
                    challengeID: challenge-123
  /test-cases/{id}:
    patch:
      tags:
        - test-cases
      summary: Update test case
      x-implementation: usecase
      x-mockup:
        input: apps/api_v2/internal/interfaces/http/test-cases/patch-update/mockup/input.json
        output: apps/api_v2/internal/interfaces/http/test-cases/patch-update/mockup/output.json
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestCasesPatchUpdateInput"
      responses:
        "200":
          description: Test case updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestCasesPatchUpdateOutput200"
    delete:
      tags:
        - test-cases
      summary: Delete test case
      x-implementation: usecase
      x-mockup:
        input: apps/api_v2/internal/interfaces/http/test-cases/delete-by-id/mockup/input.json
        output: apps/api_v2/internal/interfaces/http/test-cases/delete-by-id/mockup/output.json
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Delete response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestCasesDeleteByIdOutput200"
              example: &a21
                statusCode: 200
                body:
                  deleted: true
                  testCaseID: test-case-123
  /courses/enroll:
    post:
      tags:
        - courses
      summary: Enroll in course
      x-implementation: usecase
      x-mockup:
        input: apps/api_v2/internal/interfaces/http/courses/post-enroll/mockup/input.json
        output: apps/api_v2/internal/interfaces/http/courses/post-enroll/mockup/output.json
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoursesPostEnrollInput"
            example: &a22
              method: POST
              path: /courses/enroll
              pathParams: {}
              query: {}
              body:
                courseID: course-123
                studentID: usr-student-123
      responses:
        "200":
          description: Enrollment response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoursesPostEnrollOutput200"
              example: &a23
                statusCode: 200
                body:
                  enrolled: true
                  courseID: course-123
                  studentID: usr-student-123
  /courses:
    post:
      tags:
        - courses
      summary: Create course
      x-implementation: usecase
      x-mockup:
        input: apps/api_v2/internal/interfaces/http/courses/post-create/mockup/input.json
        output: apps/api_v2/internal/interfaces/http/courses/post-create/mockup/output.json
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoursesPostCreateInput"
            example: &a24
              method: POST
              path: /courses
              pathParams: {}
              query: {}
              body:
                name: Algorithms 1
                description: Intro to algorithms
                visibility: public
                visual_identity: "#7000ff"
                code: ALG-101
                year: 2026
                semester: "01"
                enrollment_code: ALG101-ENR
                enrollment_url: https://example.edu/enroll/ALG101-ENR
                teacher_id: usr-teacher-123
      responses:
        "201":
          description: Course created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoursesPostCreateOutput201"
              example: &a25
                statusCode: 201
                body:
                  id: course-123
                  name: Algorithms 1
                  code: ALG-101
                  teacherID: usr-teacher-123
    get:
      tags:
        - courses
      summary: List courses (owned, enrolled, or public)
      description: |
        Devuelve la lista de cursos según el alcance solicitado:
        - `scope=owned`: cursos donde el usuario autenticado es profesor.
        - `scope=enrolled`: cursos donde el usuario autenticado es estudiante.
        - (sin scope o scope distinto): lista vacía o no implementado (futuro: cursos públicos).
        
        Requiere autenticación. El usuario debe tener el rol adecuado para cada scope.
      x-implementation: usecase
      x-mockup:
        input: apps/api_v2/internal/interfaces/http/courses/get-list/mockup/input.json
        output: apps/api_v2/internal/interfaces/http/courses/get-list/mockup/output.json
      parameters:
        - in: query
          name: scope
          required: false
          schema:
            type: string
          description: |
            Alcance de la consulta. Valores soportados: `owned`, `enrolled`.
        - in: query
          name: studentId
          required: false
          schema:
            type: string
          description: (Reservado para uso futuro)
        - in: query
          name: teacherId
          required: false
          schema:
            type: string
          description: (Reservado para uso futuro)
      responses:
        "200":
          description: Lista de cursos según el scope solicitado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoursesGetListOutput200"
              example:
                statusCode: 200
                body:
                  - id: course-123
                    name: Algorithms 1
                    visibility: public
        "501":
          description: No implementado para el scope solicitado (por ejemplo, cursos públicos).
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
              example: []
  /courses/browse:
    get:
      tags:
        - courses
      summary: Browse courses
      x-implementation: mock
      x-mockup:
        input: apps/api_v2/internal/interfaces/http/courses/get-browse/mockup/input.json
        output: apps/api_v2/internal/interfaces/http/courses/get-browse/mockup/output.json
      responses:
        "200":
          description: Browse response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoursesGetBrowseOutput200"
              example: &a27
                statusCode: 501
                body:
                  message: Browse courses endpoint does not have a dedicated use case yet
  /courses/{id}:
    get:
      tags:
        - courses
      summary: Get course by ID
      x-implementation: usecase
      x-mockup:
        input: apps/api_v2/internal/interfaces/http/courses/get-by-id/mockup/input.json
        output: apps/api_v2/internal/interfaces/http/courses/get-by-id/mockup/output.json
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Course details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoursesGetByIdOutput200"
              example: &a28
                statusCode: 200
                body:
                  id: course-123
                  name: Algorithms 1
                  description: Intro to algorithms
                  code: ALG-101
    post:
      tags:
        - courses
      summary: Update course
      x-implementation: usecase
      x-mockup:
        input: apps/api_v2/internal/interfaces/http/courses/post-update/mockup/input.json
        output: apps/api_v2/internal/interfaces/http/courses/post-update/mockup/output.json
