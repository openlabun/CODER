components:
  schemas:
    SubmissionOutputDTO:
      type: object
      properties:
        submission:
          type: object
          properties:
            id:
              type: string
            userID:
              type: string
            challengeID:
              type: string
            sessionID:
              type: string
            code:
              type: string
            language:
              type: string
          required:
            - id
            - userID
            - challengeID
            - sessionID
            - code
            - language
        results:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              status:
                type: string
            required:
              - id
              - status
      required:
        - submission
        - results
    AuthPostRegisterInput:
      type: object
      properties:
        method:
          type: string
        path:
          type: string
        pathParams:
          type: object
          properties: {}
        query:
          type: object
          properties: {}
        body:
          type: object
          properties:
            email:
              type: string
            name:
              type: string
            password:
              type: string
          required:
            - email
            - name
            - password
      required:
        - method
        - path
        - pathParams
        - query
        - body
      example: *a1
    AuthPostRegisterOutput201:
      type: object
      properties:
        statusCode:
          type: integer
        body:
          type: object
          properties:
            token:
              type: object
              properties:
                access_token:
                  type: string
                refresh_token:
                  type: string
              required:
                - access_token
                - refresh_token
            user_data:
              type: object
              properties:
                id:
                  type: string
                username:
                  type: string
                email:
