components:
  schemas:
    RegisterRequest:
      type: object
      required: [email, name, password]
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        password:
          type: string
          minLength: 1

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1

    RefreshTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          minLength: 1

    Token:
      type: object
      required: [access_token, refresh_token]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string

    User:
      type: object
      required: [id, username, email, role]
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [student, professor, admin]
          description: Role values constrained by business rules.
        created_at:
          type: string
          format: date-time
          description: Optional metadata field from entity.
        last_connection:
          type: string
          format: date-time
          description: Optional metadata field from entity.

    UserAccess:
      type: object
      properties:
        token:
