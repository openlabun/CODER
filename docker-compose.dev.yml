# DEVELOPMENT ENVIRONMENT
# Use: docker-compose -f docker-compose.dev.yml up
version: "3.9"

services:
    apiv2:
        build:
            context: ./apps/api_v2
            dockerfile: Dockerfile.dev
        working_dir: /app
        command: air -c .air.toml
        ports:
            - "${APIV2_PORT:-4000}:4000"
        volumes:
            - ./apps/api_v2:/app
        env_file:
            - .env.dev
        networks:
            - judge_net
    web:
        build:
            context: ./apps/web
            dockerfile: Dockerfile.dev
        command: npm run dev -- --host
        ports:
            - "${WEB_PORT:-5173}:5173"
        volumes:
            - ./apps/web:/usr/src/app
            - /usr/src/app/node_modules
        env_file:
            - .env.dev
        networks:
            - judge_net
        depends_on:
            - api
volumes:
    pgdata:


networks:
    judge_net:
        driver: bridge
