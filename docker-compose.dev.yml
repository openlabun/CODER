# DEVELOPMENT ENVIRONMENT
# Use: docker-compose -f docker-compose.dev.yml up
version: "3.9"

services:
    apiv2:
        build:
            context: ./apps/api_v2
            dockerfile: Dockerfile.dev
        working_dir: /app
        command: air -c .air.toml
        ports:
            - "${APIV2_PORT:-4000}:4000"
        volumes:
            - ./apps/api_v2:/app
        env_file:
            - .env.dev
        depends_on:
            rabbitmq:
                condition: service_healthy
        networks:
            - judge_net

    rabbitmq:
        image: rabbitmq:3.13-management
        ports:
            - "5672:5672"
            - "15672:15672"
        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
            interval: 5s
            timeout: 5s
            retries: 20
        networks:
            - judge_net

    worker-python:
        build:
            context: ./apps/workers/python
            dockerfile: Dockerfile
        working_dir: /app
        command: python main.py
        env_file:
            - .env.dev
        environment:
            - API_BASE_URL=http://apiv2:4000
            - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
            - QUEUE_NAME=python.queue
        volumes:
            - ./apps/workers/python:/app
            - /var/run/docker.sock:/var/run/docker.sock
        depends_on:
            apiv2:
                condition: service_started
            rabbitmq:
                condition: service_healthy
        networks:
            - judge_net

    web:
        build:
            context: ./apps/web
            dockerfile: Dockerfile.dev
        command: npm run dev -- --host
        ports:
            - "${WEB_PORT:-5173}:5173"
        volumes:
            - ./apps/web:/usr/src/app
            - /usr/src/app/node_modules
        env_file:
            - .env.dev
        networks:
            - judge_net
        depends_on:
            - apiv2
volumes:
    pgdata:


networks:
    judge_net:
        driver: bridge
