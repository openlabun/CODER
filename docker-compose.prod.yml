# PRODUCTION ENVIRONMENT
# Use: docker-compose -f docker-compose.prod.yml up -d
version: "3.9"

services:
    api:
        build:
            context: ./apps/api
            dockerfile: Dockerfile.prod
        command: node dist/main.js
        restart: always
        ports:
            - "3000:3000"
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        environment:
            - NODE_ENV=production
            - POSTGRES_HOST=postgres
            - POSTGRES_PORT=5432
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - POSTGRES_DB=${POSTGRES_DB}
            - REDIS_HOST=redis
            - REDIS_PORT=6379
            - REDIS_PASSWORD=${REDIS_PASSWORD:-}
            - GEMINI_API_KEY=${GEMINI_API_KEY}
        networks:
            - judge_net
        healthcheck:
            test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
        deploy:
            resources:
                limits:
                    cpus: '1'
                    memory: 1G
    
    web:
        build:
            context: ./apps/web
            dockerfile: Dockerfile.prod
            args:
                - VITE_API_URL=${VITE_API_URL}
        restart: always
        ports:
            - "80:80"
            - "443:443"
        networks:
            - judge_net
        depends_on:
            - api
        healthcheck:
            test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
            interval: 30s
            timeout: 10s
            retries: 3
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 512M

    postgres:
        image: postgres:16-alpine
        restart: always
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        volumes:
            - pgdata_prod:/var/lib/postgresql/data
            - ./apps/api/migrations:/docker-entrypoint-initdb.d:ro
        networks:
            - judge_net
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
            interval: 10s
            timeout: 5s
            retries: 5
        deploy:
            resources:
                limits:
                    cpus: '1'
                    memory: 1G

    redis:
        image: redis:7-alpine
        container_name: juez_redis_prod
        restart: always
        command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass} ${REDIS_PASSWORD:-}
        volumes:
            - redis_data:/data
        networks:
            - judge_net
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
    
    runner-python:
        build:
            context: ./apps/api/src/runners/python
        image: juez_runner_python:prod
        restart: "no"

    runner-node:
        build:
            context: ./apps/api/src/runners/node
        image: juez_runner_node:prod
        restart: "no"

    runner-cpp:
        build:
            context: ./apps/api/src/runners/cpp
        image: juez_runner_cpp:prod
        restart: "no"

    runner-java:
        build:
            context: ./apps/api/src/runners/java
        image: juez_runner_java:prod
        restart: "no"
    
    worker:
        build:
            context: ./apps/api
            dockerfile: Dockerfile.worker
            args:
                - NODE_ENV=production
        command: npm run worker
        restart: always
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - submissions_data:/usr/src/app/data
        depends_on:
            - runner-python
            - runner-node
            - runner-cpp
            - runner-java
            - postgres
            - redis

        environment:
            - NODE_ENV=production
            - POSTGRES_HOST=postgres
            - POSTGRES_PORT=5432
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - POSTGRES_DB=${POSTGRES_DB}
            - REDIS_HOST=redis
            - REDIS_PORT=6379
            - REDIS_PASSWORD=${REDIS_PASSWORD:-}
            - HOST_SUBMISSIONS_DIR=/data/submissions
        networks:
            - judge_net
        deploy:
            resources:
                limits:
                    cpus: '2'
                    memory: 2G

volumes:
    pgdata_prod:
    redis_data:
    submissions_data:

networks:
    judge_net:
        driver: bridge
