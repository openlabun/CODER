# PRODUCTION ENVIRONMENT
# Use: docker compose -f docker-compose.yml up -d --build
version: "3.9"

services:
    apiv2:
        build:
            context: ./apps/api_v2
            dockerfile: Dockerfile.prod
        restart: always
        ports:
            - "${APIV2_PORT:-4000}:${APIV2_PORT:-4000}"
        env_file:
            - .env.dev
        environment:
            - APIV2_PORT=${APIV2_PORT:-4000}
            - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
        depends_on:
            rabbitmq:
                condition: service_healthy
        networks:
            - judge_net

    rabbitmq:
        image: rabbitmq:3.13-management
        restart: always
        expose:
            - "5672:5672"
            - "15672:15672"
        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
            interval: 5s
            timeout: 5s
            retries: 20
        networks:
            - judge_net

    worker-python:
        build:
            context: ./apps/workers/python
            dockerfile: Dockerfile
        working_dir: /app
        command: python main.py
        restart: always
        env_file:
            - .env.dev
        environment:
            - API_BASE_URL=http://apiv2:${APIV2_PORT:-4000}
            - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
            - QUEUE_NAME=${PYTHON_QUEUE:-python.queue}
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
        depends_on:
            apiv2:
                condition: service_started
            rabbitmq:
                condition: service_healthy
        networks:
            - judge_net

networks:
    judge_net:
        driver: bridge
